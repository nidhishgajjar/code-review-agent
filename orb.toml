# Orb Cloud config for the code review agent.
# Each computer is assigned one GitHub repo via GITHUB_REPO env var.
# Agent runs OpenHands CLI in headless mode via watchdog.

[agent]
name  = "code-review-agent"
lang  = "binary"
entry = "/bin/bash"
args  = ["/root/src/watchdog.sh"]

[agent.env]
HOME             = "/root"
GITHUB_TOKEN     = "${GITHUB_TOKEN}"
GITHUB_REPO      = "${GITHUB_REPO}"
LLM_MODEL        = "anthropic/glm-5.1"
LLM_API_KEY      = "${GLM_API_KEY}"
LLM_BASE_URL     = "https://api.z.ai/api/anthropic"
OPENHANDS_SUPPRESS_BANNER = "1"

[source]
git    = "https://github.com/AWLSEN/code-review-agent"
branch = "main"

[build]
working_dir = "/root"
steps = [
  "apt-get update && apt-get install -y --no-install-recommends git curl ca-certificates python3 python3-pip",
  "curl -fsSL https://install.openhands.dev/install.sh | sh",
  "cp -r /agent/code/src /root/src",
  "chmod +x /root/src/watchdog.sh",
  "mkdir -p /root/data/reviews /root/data/logs",
]

[resources]
runtime = "4GB"
disk    = "8GB"

[lifecycle]
idle_timeout = "120s"
