[agent]
name = "code-review-agent"
lang = "python"
entry = "runner.py"

[agent.env]
GITHUB_TOKEN = "${GITHUB_TOKEN}"
GITHUB_WEBHOOK_SECRET = "${GITHUB_WEBHOOK_SECRET}"
LLM_API_KEY = "${GLM_API_KEY}"
LLM_BASE_URL = "https://api.z.ai/api/anthropic"
LLM_MODEL = "anthropic/glm-4.6"
PORT = "8080"
STATE_DIR = "/agent/data/state"
REPOS_FILE = "/agent/code/repos.txt"
OSS_REPOS_FILE = "/agent/code/oss-repos.txt"
WORKDIR = "/agent/data/work"
PUBLIC_URL = "${PUBLIC_URL}"
OWN_REPOS = "${OWN_REPOS}"
OSS_REPOS = "${OSS_REPOS}"
OPENHANDS_SUPPRESS_BANNER = "1"

[source]
git = "https://github.com/nidhishgajjar/code-review-agent"
branch = "main"

[build]
steps = [
  "pip install --no-cache-dir -r requirements.txt",
  "mkdir -p /agent/data/state /agent/data/work /agent/data/logs /agent/.orb",
  "cp cron.json /agent/.orb/cron.json",
]

[llm]
base_url = "https://api.z.ai/api/anthropic"

[ports]
expose = [8080]

[resources]
runtime = "4GB"
disk = "6GB"

[lifecycle]
idle_timeout = "60s"
