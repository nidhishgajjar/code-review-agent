[agent]
name = "code-review-agent"
lang = "python"
entry = "runner.py"

[agent.env]
GITHUB_TOKEN = "${GITHUB_TOKEN}"
LLM_API_KEY = "${OPENROUTER_API_KEY}"
LLM_BASE_URL = "https://openrouter.ai/api/v1"
LLM_MODEL = "openrouter/anthropic/claude-sonnet-4-5"
NUM_AGENTS = "1"
POLL_INTERVAL = "60"
STATE_DIR = "/agent/data/state"
REPOS_FILE = "/agent/code/repos.txt"
WORKDIR = "/agent/data/work"
OPENHANDS_SUPPRESS_BANNER = "1"

[source]
git = "https://github.com/nidhishgajjar/code-review-agent"
branch = "main"

[build]
steps = [
  "pip install --no-cache-dir -r requirements.txt",
  "mkdir -p /agent/data/state /agent/data/work /agent/data/logs",
]

[llm]
base_url = "https://openrouter.ai/api/v1"

[resources]
runtime = "2GB"
disk = "6GB"

[lifecycle]
idle_timeout = "3600s"
