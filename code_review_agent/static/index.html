<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Review Agent</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-hover: #30363d;
  --border: #30363d;
  --border-light: #484f58;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --green: #3fb950;
  --green-bg: rgba(63,185,80,0.15);
  --red: #f85149;
  --red-bg: rgba(248,81,73,0.15);
  --yellow: #d29922;
  --yellow-bg: rgba(210,153,34,0.15);
  --purple: #bc8cff;
  --radius: 6px;
  --radius-lg: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.4);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.4);
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
  --transition: 150ms ease;
}

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

/* Layout */
.app {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: auto 1fr;
  min-height: 100vh;
  gap: 0;
}

.header {
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
}

.header-logo svg { flex-shrink: 0; }

.main-content {
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.sidebar {
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-header .count {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 10px;
  font-weight: 500;
}

.sidebar-body { padding: 8px; flex: 1; overflow-y: auto; }

/* Input section */
.input-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}

.input-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  flex-wrap: wrap;
}

.field { display: flex; flex-direction: column; gap: 6px; }
.field-grow { flex: 1; min-width: 240px; }

.field label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}

input[type="text"], select {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: var(--font-sans);
  transition: border-color var(--transition);
  outline: none;
  width: 100%;
}

input[type="text"]:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(88,166,255,0.15);
}

input::placeholder { color: var(--text-muted); }

select { cursor: pointer; padding-right: 28px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  line-height: 1.4;
}

.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-primary {
  background: #238636;
  border-color: rgba(240,246,252,0.1);
  color: #fff;
}
.btn-primary:hover:not(:disabled) { background: #2ea043; }

.btn-secondary {
  background: var(--bg-tertiary);
  border-color: var(--border);
  color: var(--text-primary);
}
.btn-secondary:hover:not(:disabled) { background: var(--bg-hover); border-color: var(--border-light); }

.btn-accent {
  background: rgba(88,166,255,0.1);
  border-color: rgba(88,166,255,0.3);
  color: var(--accent);
}
.btn-accent:hover:not(:disabled) { background: rgba(88,166,255,0.2); }

.btn-sm { padding: 4px 10px; font-size: 12px; }

.action-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.action-bar .spacer { flex: 1; }

/* PR Table */
.table-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.table-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.table-header h2 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.table-header h2 .badge {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  font-size: 12px;
  padding: 1px 8px;
  border-radius: 10px;
  font-weight: 500;
}

.pr-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.pr-table th {
  text-align: left;
  padding: 10px 16px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  background: var(--bg-primary);
}

.pr-table td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.pr-table tr:last-child td { border-bottom: none; }

.pr-table tr:hover td { background: rgba(88,166,255,0.04); }

.pr-number { color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; }
.pr-title { color: var(--text-primary); font-weight: 500; }
.pr-title:hover { color: var(--accent); }
.pr-author { color: var(--text-secondary); }
.pr-branch {
  font-family: var(--font-mono);
  font-size: 11px;
  background: rgba(88,166,255,0.1);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 4px;
  display: inline-block;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.pr-files {
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 12px;
  text-align: center;
}

.table-empty {
  padding: 48px 20px;
  text-align: center;
  color: var(--text-muted);
}

.table-empty svg { margin-bottom: 12px; opacity: 0.4; }
.table-empty p { font-size: 14px; }

/* Results panel */
.results-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.results-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.results-body { padding: 20px; }

.result-card {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}

.result-card-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  cursor: pointer;
  user-select: none;
}

.result-card-header:hover { background: var(--bg-tertiary); }

.result-card-title {
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.result-card-toggle {
  color: var(--text-muted);
  font-size: 12px;
  transition: transform var(--transition);
}

.result-card.collapsed .result-card-toggle { transform: rotate(-90deg); }
.result-card.collapsed .result-card-body { display: none; }

.result-card-body { padding: 16px; }

/* Markdown styles */
.md h1 { font-size: 20px; font-weight: 600; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.md h2 { font-size: 17px; font-weight: 600; margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.md h3 { font-size: 15px; font-weight: 600; margin: 16px 0 6px; }
.md h4 { font-size: 13px; font-weight: 600; margin: 14px 0 6px; }
.md h1:first-child, .md h2:first-child, .md h3:first-child { margin-top: 0; }
.md p { margin: 8px 0; color: var(--text-secondary); line-height: 1.7; }
.md strong { color: var(--text-primary); font-weight: 600; }
.md em { font-style: italic; }
.md hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.md ul, .md ol { margin: 8px 0; padding-left: 24px; color: var(--text-secondary); }
.md li { margin: 4px 0; line-height: 1.6; }
.md code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: rgba(110,118,129,0.2);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--text-primary);
}
.md pre {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin: 10px 0;
  overflow-x: auto;
}
.md pre code {
  background: none;
  padding: 0;
  font-size: 12px;
  line-height: 1.5;
  color: var(--text-primary);
}
.md blockquote {
  border-left: 3px solid var(--border);
  padding: 4px 16px;
  margin: 10px 0;
  color: var(--text-muted);
}

/* Job tracker */
.job-item {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 6px;
  transition: border-color var(--transition);
}

.job-item.status-running { border-left: 3px solid var(--yellow); }
.job-item.status-pending { border-left: 3px solid var(--text-muted); }
.job-item.status-completed { border-left: 3px solid var(--green); }
.job-item.status-failed { border-left: 3px solid var(--red); }

.job-type {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.job-status {
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-muted);
}

.job-status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
}

.job-status-badge.pending { background: var(--bg-tertiary); color: var(--text-muted); }
.job-status-badge.running { background: var(--yellow-bg); color: var(--yellow); }
.job-status-badge.completed { background: var(--green-bg); color: var(--green); }
.job-status-badge.failed { background: var(--red-bg); color: var(--red); }

.job-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

.sidebar-empty {
  padding: 32px 16px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
}

/* Spinner */
.spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}

.spinner-sm { width: 11px; height: 11px; border-width: 1.5px; }

@keyframes spin { to { transform: rotate(360deg); } }

/* Loader overlay */
.table-loader {
  padding: 48px 20px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  color: var(--text-muted);
}

.table-loader .spinner { width: 24px; height: 24px; }

/* Toast */
.toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column-reverse;
  gap: 8px;
  max-width: 400px;
}

.toast {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  animation: toast-in 200ms ease;
  font-size: 13px;
  line-height: 1.4;
}

.toast.error { border-color: rgba(248,81,73,0.4); }
.toast.success { border-color: rgba(63,185,80,0.4); }

.toast-icon { flex-shrink: 0; margin-top: 1px; }
.toast-msg { flex: 1; color: var(--text-secondary); }
.toast-close {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 16px; line-height: 1; padding: 0; flex-shrink: 0;
}
.toast-close:hover { color: var(--text-primary); }

@keyframes toast-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Responsive */
@media (max-width: 900px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: auto 1fr auto;
  }
  .sidebar {
    border-left: none;
    border-top: 1px solid var(--border);
    max-height: 300px;
  }
  .pr-branch { max-width: 120px; }
}

@media (max-width: 640px) {
  .header { padding: 12px 16px; }
  .main-content { padding: 16px; }
  .input-row { flex-direction: column; }
  .field-grow { min-width: 0; }
  .pr-table th:nth-child(4), .pr-table td:nth-child(4) { display: none; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
      </svg>
      Code Review Agent
    </div>
  </header>

  <main class="main-content">
    <!-- Input Section -->
    <section class="input-section">
      <div class="input-row">
        <div class="field field-grow">
          <label for="repo-url">Repository URL</label>
          <input type="text" id="repo-url" placeholder="https://github.com/owner/repo" spellcheck="false" />
        </div>
        <div class="field" style="min-width:180px;">
          <label for="model-select">Model</label>
          <select id="model-select">
            <option value="">Loading models...</option>
          </select>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button class="btn btn-primary" id="scan-btn" onclick="scanPRs()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Scan PRs
          </button>
        </div>
      </div>
    </section>

    <!-- PR Table -->
    <section class="table-section" id="pr-section" style="display:none;">
      <div class="table-header">
        <h2>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>
          Open Pull Requests
          <span class="badge" id="pr-count">0</span>
        </h2>
        <div class="action-bar">
          <button class="btn btn-accent btn-sm" onclick="triagePRs()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Triage
          </button>
          <button class="btn btn-primary btn-sm" onclick="reviewAll()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Review All
          </button>
        </div>
      </div>
      <div id="pr-table-body"></div>
    </section>

    <!-- Loading indicator for scan -->
    <div class="table-loader" id="scan-loader" style="display:none;">
      <div class="spinner"></div>
      <p>Scanning repository for open pull requests...</p>
    </div>

    <!-- Results -->
    <section class="results-section" id="results-section" style="display:none;">
      <div class="results-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Results
      </div>
      <div class="results-body" id="results-body"></div>
    </section>
  </main>

  <!-- Sidebar: Job Tracker -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Jobs
      <span class="count" id="job-count">0</span>
    </div>
    <div class="sidebar-body" id="jobs-list">
      <div class="sidebar-empty" id="jobs-empty">No jobs yet. Scan a repository to get started.</div>
    </div>
  </aside>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script>
// --- State ---
const state = {
  models: [],
  prs: [],
  jobs: {},       // jobId -> {id, type, label, status, result, error, created_at}
  results: [],    // [{type, label, content}]
  pollers: {},    // jobId -> intervalId
};

// --- Init ---
document.addEventListener('DOMContentLoaded', () => {
  loadModels();
  const saved = localStorage.getItem('cra_repo_url');
  if (saved) document.getElementById('repo-url').value = saved;
});

// --- API helpers ---
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { const j = await res.json(); msg = j.detail || j.error || msg; } catch {}
    throw new Error(msg);
  }
  return res.json();
}

// --- Models ---
async function loadModels() {
  try {
    const models = await api('GET', '/api/models');
    state.models = models;
    const sel = document.getElementById('model-select');
    sel.innerHTML = '';
    if (models.length === 0) {
      sel.innerHTML = '<option value="">No models available</option>';
      return;
    }
    models.forEach((m, i) => {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name || m.id;
      if (m.provider) opt.textContent += ` (${m.provider})`;
      sel.appendChild(opt);
    });
  } catch (e) {
    document.getElementById('model-select').innerHTML = '<option value="">Failed to load</option>';
    toast('Failed to load models: ' + e.message, 'error');
  }
}

// --- Inputs ---
function getInputs() {
  const repo_url = document.getElementById('repo-url').value.trim();
  const model = document.getElementById('model-select').value;
  if (!repo_url) { toast('Please enter a repository URL.', 'error'); return null; }
  if (!model) { toast('Please select a model.', 'error'); return null; }
  localStorage.setItem('cra_repo_url', repo_url);
  return { repo_url, model };
}

// --- Scan PRs ---
async function scanPRs() {
  const inputs = getInputs();
  if (!inputs) return;
  const btn = document.getElementById('scan-btn');
  btn.disabled = true;
  document.getElementById('pr-section').style.display = 'none';
  document.getElementById('scan-loader').style.display = 'flex';

  try {
    const { job_id } = await api('POST', '/api/scan', inputs);
    trackJob(job_id, 'scan', 'Scan PRs', (job) => {
      btn.disabled = false;
      document.getElementById('scan-loader').style.display = 'none';
      if (job.status === 'completed' && job.result) {
        const prs = Array.isArray(job.result) ? job.result : (job.result.prs || job.result.pull_requests || []);
        state.prs = prs;
        renderPRTable(prs);
        toast(`Found ${prs.length} open pull request${prs.length !== 1 ? 's' : ''}.`, 'success');
      } else if (job.status === 'failed') {
        toast('Scan failed: ' + (job.error || 'Unknown error'), 'error');
      }
    });
  } catch (e) {
    btn.disabled = false;
    document.getElementById('scan-loader').style.display = 'none';
    toast('Scan failed: ' + e.message, 'error');
  }
}

// --- PR Table ---
function renderPRTable(prs) {
  const section = document.getElementById('pr-section');
  const body = document.getElementById('pr-table-body');
  document.getElementById('pr-count').textContent = prs.length;

  if (prs.length === 0) {
    body.innerHTML = `<div class="table-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>
      <p>No open pull requests found.</p>
    </div>`;
    section.style.display = 'block';
    return;
  }

  let html = `<table class="pr-table">
    <thead><tr>
      <th>#</th><th>Title</th><th>Author</th><th>Branch</th><th>Files</th><th></th>
    </tr></thead><tbody>`;

  prs.forEach(pr => {
    const num = pr.number || pr.pr_number || '';
    const title = escapeHtml(pr.title || '');
    const author = escapeHtml(pr.author || pr.user || '');
    const branch = escapeHtml(pr.branch || pr.head || pr.head_ref || '');
    const files = pr.files_changed ?? pr.changed_files ?? '';
    html += `<tr>
      <td class="pr-number">${num}</td>
      <td class="pr-title">${title}</td>
      <td class="pr-author">${author}</td>
      <td><span class="pr-branch" title="${branch}">${branch}</span></td>
      <td class="pr-files">${files}</td>
      <td><button class="btn btn-secondary btn-sm" onclick="reviewPR(${num}, '${escapeHtml(title)}')">Review</button></td>
    </tr>`;
  });

  html += '</tbody></table>';
  body.innerHTML = html;
  section.style.display = 'block';
}

// --- Review single PR ---
async function reviewPR(prNumber, title) {
  const inputs = getInputs();
  if (!inputs) return;
  try {
    const { job_id } = await api('POST', '/api/review', { ...inputs, pr_number: prNumber });
    trackJob(job_id, 'review', `Review PR #${prNumber}`, (job) => {
      if (job.status === 'completed') {
        addResult('review', `Review: PR #${prNumber} - ${title}`, job.result);
        toast(`Review complete for PR #${prNumber}.`, 'success');
      } else if (job.status === 'failed') {
        toast(`Review failed for PR #${prNumber}: ${job.error || 'Unknown error'}`, 'error');
      }
    });
  } catch (e) {
    toast('Review request failed: ' + e.message, 'error');
  }
}

// --- Review All ---
async function reviewAll() {
  const inputs = getInputs();
  if (!inputs) return;
  try {
    const { job_id } = await api('POST', '/api/review-all', inputs);
    trackJob(job_id, 'review-all', 'Review All PRs', (job) => {
      if (job.status === 'completed') {
        addResult('review-all', 'Review All PRs', job.result);
        toast('All PR reviews complete.', 'success');
      } else if (job.status === 'failed') {
        toast('Review All failed: ' + (job.error || 'Unknown error'), 'error');
      }
    });
  } catch (e) {
    toast('Review All request failed: ' + e.message, 'error');
  }
}

// --- Triage ---
async function triagePRs() {
  const inputs = getInputs();
  if (!inputs) return;
  try {
    const { job_id } = await api('POST', '/api/triage', inputs);
    trackJob(job_id, 'triage', 'Triage PRs', (job) => {
      if (job.status === 'completed') {
        addResult('triage', 'PR Triage / Prioritization', job.result);
        toast('Triage complete.', 'success');
      } else if (job.status === 'failed') {
        toast('Triage failed: ' + (job.error || 'Unknown error'), 'error');
      }
    });
  } catch (e) {
    toast('Triage request failed: ' + e.message, 'error');
  }
}

// --- Job Tracking ---
function trackJob(jobId, type, label, onDone) {
  state.jobs[jobId] = { id: jobId, type, label, status: 'pending', created_at: new Date().toISOString() };
  renderJobs();

  const poll = async () => {
    try {
      const job = await api('GET', `/api/jobs/${jobId}`);
      state.jobs[jobId] = { ...state.jobs[jobId], ...job, type, label };
      renderJobs();

      if (job.status === 'completed' || job.status === 'failed') {
        clearInterval(state.pollers[jobId]);
        delete state.pollers[jobId];
        if (onDone) onDone(job);
      }
    } catch (e) {
      // keep polling on transient errors
    }
  };

  poll(); // immediate first check
  state.pollers[jobId] = setInterval(poll, 2000);
}

function renderJobs() {
  const list = document.getElementById('jobs-list');
  const empty = document.getElementById('jobs-empty');
  const entries = Object.values(state.jobs).sort((a, b) => {
    if (a.created_at && b.created_at) return new Date(b.created_at) - new Date(a.created_at);
    return 0;
  });

  document.getElementById('job-count').textContent = entries.length;

  if (entries.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const typeIcons = {
    scan: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
    review: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
    'review-all': '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    triage: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
  };

  let html = '';
  entries.forEach(j => {
    const icon = typeIcons[j.type] || '';
    const spinnerHtml = (j.status === 'running' || j.status === 'pending') ? '<span class="spinner spinner-sm"></span>' : '';
    const time = j.created_at ? formatTime(j.created_at) : '';
    html += `<div class="job-item status-${j.status}">
      <div class="job-type">${icon} ${escapeHtml(j.label)}</div>
      <div class="job-status">
        ${spinnerHtml}
        <span class="job-status-badge ${j.status}">${j.status}</span>
      </div>
      ${time ? `<div class="job-time">${time}</div>` : ''}
    </div>`;
  });
  // Keep the empty div but hidden
  list.innerHTML = html + '<div class="sidebar-empty" id="jobs-empty" style="display:none;">No jobs yet.</div>';
}

// --- Results ---
function addResult(type, label, content) {
  const section = document.getElementById('results-section');
  const body = document.getElementById('results-body');
  section.style.display = 'block';

  const text = typeof content === 'string' ? content : JSON.stringify(content, null, 2);
  const id = 'result-' + Date.now();

  const card = document.createElement('div');
  card.className = 'result-card';
  card.id = id;
  card.innerHTML = `
    <div class="result-card-header" onclick="toggleResult('${id}')">
      <div class="result-card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${type === 'triage' ? 'var(--purple)' : 'var(--green)'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        ${escapeHtml(label)}
      </div>
      <div class="result-card-toggle">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="result-card-body">
      <div class="md">${renderMarkdown(text)}</div>
    </div>`;

  body.prepend(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function toggleResult(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('collapsed');
}

// --- Markdown renderer ---
function renderMarkdown(text) {
  if (!text) return '<p style="color:var(--text-muted);">No content.</p>';

  // Normalize line endings
  text = text.replace(/\r\n/g, '\n');

  // Code blocks (fenced)
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code class="lang-${lang}">${escapeHtml(code.replace(/\n$/, ''))}</code></pre>`;
  });

  // Split into lines for block-level processing
  const lines = text.split('\n');
  let html = '';
  let inList = false;
  let listType = '';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];

    // Skip pre blocks already converted
    if (line.startsWith('<pre>')) {
      // Find closing </pre>
      let block = line;
      while (i < lines.length - 1 && !lines[i].includes('</pre>')) {
        i++;
        block += '\n' + lines[i];
      }
      if (inList) { html += `</${listType}>`; inList = false; }
      html += block;
      i++;
      continue;
    }

    // Horizontal rule
    if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
      if (inList) { html += `</${listType}>`; inList = false; }
      html += '<hr>';
      i++;
      continue;
    }

    // Headers
    const headerMatch = line.match(/^(#{1,4})\s+(.+)/);
    if (headerMatch) {
      if (inList) { html += `</${listType}>`; inList = false; }
      const level = headerMatch[1].length;
      html += `<h${level}>${inlineFormat(headerMatch[2])}</h${level}>`;
      i++;
      continue;
    }

    // Unordered list
    if (/^\s*[-*+]\s+/.test(line)) {
      if (!inList || listType !== 'ul') {
        if (inList) html += `</${listType}>`;
        html += '<ul>';
        inList = true;
        listType = 'ul';
      }
      html += `<li>${inlineFormat(line.replace(/^\s*[-*+]\s+/, ''))}</li>`;
      i++;
      continue;
    }

    // Ordered list
    if (/^\s*\d+[.)]\s+/.test(line)) {
      if (!inList || listType !== 'ol') {
        if (inList) html += `</${listType}>`;
        html += '<ol>';
        inList = true;
        listType = 'ol';
      }
      html += `<li>${inlineFormat(line.replace(/^\s*\d+[.)]\s+/, ''))}</li>`;
      i++;
      continue;
    }

    // Close list if we are no longer in one
    if (inList) {
      html += `</${listType}>`;
      inList = false;
    }

    // Blockquote
    if (line.startsWith('> ')) {
      html += `<blockquote>${inlineFormat(line.slice(2))}</blockquote>`;
      i++;
      continue;
    }

    // Empty line
    if (line.trim() === '') {
      i++;
      continue;
    }

    // Paragraph
    html += `<p>${inlineFormat(line)}</p>`;
    i++;
  }

  if (inList) html += `</${listType}>`;
  return html;
}

function inlineFormat(text) {
  // Inline code (must be before bold/italic)
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  text = text.replace(/_(.+?)_/g, '<em>$1</em>');
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent);">$1</a>');
  return text;
}

// --- Utilities ---
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function formatTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return ''; }
}

// --- Toasts ---
function toast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;

  const iconSvg = type === 'error'
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f85149" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';

  el.innerHTML = `<span class="toast-icon">${iconSvg}</span>
    <span class="toast-msg">${escapeHtml(message)}</span>
    <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>`;

  container.appendChild(el);
  setTimeout(() => { if (el.parentElement) el.remove(); }, 6000);
}
